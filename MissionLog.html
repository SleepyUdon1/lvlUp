<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mission Log" />
<title>Mission Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root {
    /* solarpunk palette mapped onto the original variable names */
    --space-0: #f3ead6;   /* sun-warmed parchment (app bg) */
    --space-1: #e7d9bc;   /* lighter panel surface / bars */
    --space-2: #ddcaa6;   /* input / tile surface */
    --space-3: #cdb583;   /* pressed / track */
    --panel: #eadfc4;     /* card bg */
    --panel-line: #a98b54; /* brass/wood border */
    --star: #2f3d27;       /* deep leaf — primary text/headings on light */
    --txt: #44502f;        /* moss text */
    --txt-dim: #8a7c52;    /* faded bark */
    --neon-cyan: #1f7a6b;  /* teal-green (links/accent) */
    --neon-pink: #c2562f;  /* terracotta */
    --neon-yellow: #d99a16; /* honey gold */
    --neon-green: #4f8a3a;  /* leaf green */
    --neon-orange: #c9772a; /* copper */
    --neon-purple: #7a5fa0; /* dusk violet */
    --danger: #b23a2e;      /* rust red */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--space-0);
    color: var(--txt);
    font-family: "VT323", monospace;
    font-size: 20px;
    overflow: hidden;
    image-rendering: pixelated;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(2px 2px at 18% 28%, rgba(217,154,22,0.55), transparent),
      radial-gradient(1px 1px at 62% 68%, rgba(79,138,58,0.5), transparent),
      radial-gradient(1px 1px at 82% 22%, rgba(217,154,22,0.45), transparent),
      radial-gradient(2px 2px at 36% 82%, rgba(31,122,107,0.4), transparent),
      radial-gradient(1px 1px at 88% 58%, rgba(194,86,47,0.4), transparent),
      radial-gradient(2px 2px at 50% 44%, rgba(217,154,22,0.35), transparent);
    background-size: 200px 200px, 250px 250px, 180px 180px, 300px 300px, 220px 220px, 400px 400px;
    opacity: 0.7;
    animation: drift 90s linear infinite;
  }
  @keyframes drift { from { background-position: 0 0; } to { background-position: 120px -260px; } }

  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  .pixel { font-family: "Press Start 2P", monospace; }

  /* ---------- HUD top bar ---------- */
  .hud {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px;
    background: var(--space-1);
    border-bottom: 3px solid var(--panel-line);
  }
  .astro {
    width: 56px; height: 77px; flex: 0 0 auto;
    image-rendering: pixelated;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .hud-info { flex: 1 1 auto; min-width: 0; }
  .hud-title { font-size: 10px; color: var(--neon-cyan); letter-spacing: 1px; }
  .rank { font-size: 22px; color: var(--star); margin: 2px 0 4px; }
  .xp-bar {
    height: 14px; background: var(--space-3); border: 2px solid var(--panel-line);
    position: relative; overflow: hidden;
  }
  .xp-fill { height: 100%; background: var(--neon-green); width: 0%; transition: width 0.5s steps(20); }
  .xp-text { font-size: 13px; color: var(--txt-dim); margin-top: 2px; }
  .lvl-badge {
    flex: 0 0 auto; text-align: center;
    background: var(--space-2); border: 2px solid var(--neon-yellow);
    padding: 6px 10px;
  }
  .lvl-badge .pixel { font-size: 9px; color: var(--neon-yellow); }
  .lvl-badge .num { font-size: 30px; color: var(--star); line-height: 1; }

  /* ---------- tab views ---------- */
  .views { flex: 1 1 auto; overflow: hidden; position: relative; min-height: 0; }
  .view { position: absolute; inset: 0; overflow-y: auto; padding: 16px; display: none; }
  .view.active { display: block; }
  .view::-webkit-scrollbar { width: 10px; }
  .view::-webkit-scrollbar-thumb { background: var(--panel-line); }

  h2.section {
    font-family: "Press Start 2P", monospace; font-size: 13px;
    color: var(--neon-cyan); margin: 0 0 16px; letter-spacing: 1px;
  }
  .panel {
    background: var(--panel); border: 3px solid var(--panel-line);
    padding: 14px; margin-bottom: 16px;
  }
  .panel-title { font-size: 16px; color: var(--neon-yellow); letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }

  /* ---------- bottom tab bar ---------- */
  .tabbar {
    flex: 0 0 auto;
    display: flex; background: var(--space-1);
    border-top: 3px solid var(--panel-line);
  }
  .tab {
    flex: 1; text-align: center; padding: 12px 1px 14px;
    background: none; border: none; cursor: pointer; color: var(--txt-dim);
    font-family: inherit; transition: color 0.15s;
  }
  .tab .ico { font-size: 26px; line-height: 1; }
  .tab .lbl { font-family: "Press Start 2P", monospace; font-size: 7px; display: block; margin-top: 7px; }
  .tab.active { color: var(--neon-cyan); }
  .tab.active .ico { filter: drop-shadow(0 0 4px var(--neon-cyan)); }

  /* ---------- calendar ---------- */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav .wk { font-size: 18px; color: var(--star); }
  .btn {
    font-family: "VT323", monospace; font-size: 17px;
    background: var(--space-2); color: var(--txt); border: 2px solid var(--panel-line);
    padding: 6px 12px; cursor: pointer;
  }
  .btn:active { background: var(--space-3); }
  .btn-go { color: var(--neon-cyan); border-color: var(--neon-cyan); }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day { background: var(--panel); border: 2px solid var(--panel-line); min-height: 270px; display: flex; flex-direction: column; }
  .day.today { border-color: var(--neon-pink); }
  .day-h { padding: 6px 8px 4px; border-bottom: 2px solid var(--space-3); }
  .day-name { font-size: 11px; color: var(--neon-cyan); letter-spacing: 1px; }
  .day-date { font-size: 22px; color: var(--star); }
  .day.today .day-date { color: var(--neon-pink); }
  .day-note { flex: 1; background: none; border: none; outline: none; resize: none; color: var(--txt); font-family: inherit; font-size: 16px; padding: 6px 8px; }
  .day-note::placeholder { color: var(--txt-dim); }

  /* ---------- canvas ---------- */
  .canvas-wrap { position: relative; height: 420px; border: 3px solid var(--panel-line); border-right: none; background: var(--space-1); margin-top: 16px; margin-right: -16px; }
  .canvas-bar { position: absolute; top: 8px; left: 8px; display: flex; gap: 6px; z-index: 3; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border: 2px solid #000; cursor: pointer; padding: 0; }
  .swatch.active { outline: 2px solid var(--star); }
  #pad { display: block; width: 100%; height: 100%; touch-action: none; }

  /* ---------- forms ---------- */
  input[type=text], input[type=number], select {
    font-family: "VT323", monospace; font-size: 18px;
    background: var(--space-2); color: var(--txt); border: 2px solid var(--panel-line);
    padding: 7px 10px; width: 100%;
  }
  input::placeholder { color: var(--txt-dim); }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .row > * { flex: 1; }
  .row .shrink { flex: 0 0 auto; }

  /* ---------- finances ---------- */
  .money-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--space-2); border: 2px solid var(--panel-line); padding: 10px; text-align: center; }
  .stat .k { font-size: 11px; color: var(--txt-dim); letter-spacing: 1px; }
  .stat .v { font-size: 24px; margin-top: 4px; }
  .v.pos { color: var(--neon-green); } .v.neg { color: var(--danger); }
  .budget-wrap { margin: 10px 0; }
  .budget-bar { height: 18px; background: var(--space-3); border: 2px solid var(--panel-line); overflow: hidden; }
  .budget-fill { height: 100%; width: 0%; transition: width 0.4s steps(15); }
  .txn { display: flex; align-items: center; gap: 8px; padding: 7px 4px; border-bottom: 1px solid var(--space-3); font-size: 17px; }
  .txn .desc { flex: 1; }
  .txn .amt.exp { color: var(--danger); } .txn .amt.inc { color: var(--neon-green); }
  .txn .del { cursor: pointer; color: var(--txt-dim); padding: 0 6px; }

  /* ---------- habits ---------- */
  .habit { background: var(--space-2); border: 2px solid var(--panel-line); padding: 10px; margin-bottom: 10px; }
  .habit-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .habit-name { flex: 1; font-size: 19px; color: var(--star); }
  .streak { font-size: 16px; color: var(--neon-orange); }
  .habit-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .hbox { aspect-ratio: 1; border: 2px solid var(--panel-line); background: var(--space-1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--txt-dim); }
  .hbox.done { background: var(--neon-green); color: var(--space-0); border-color: var(--neon-green); }
  .hbox .dl { font-size: 10px; }

  /* ---------- todo ---------- */
  .todo { display: flex; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--space-3); }
  .check { width: 24px; height: 24px; flex: 0 0 auto; border: 2px solid var(--neon-cyan); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--neon-cyan); font-size: 18px; }
  .todo.done .check { background: var(--neon-cyan); color: var(--space-0); }
  .todo.done .ttxt { text-decoration: line-through; color: var(--txt-dim); }
  .ttxt { flex: 1; font-size: 19px; }
  .del-x { cursor: pointer; color: var(--txt-dim); padding: 0 6px; }

  /* ---------- notes / logbook ---------- */
  .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .book { position: relative; cursor: pointer; }
  .book-cover {
    aspect-ratio: 3/4; border: 3px solid var(--panel-line); border-left-width: 8px;
    background: var(--space-2); display: flex; flex-direction: column; justify-content: flex-end;
    padding: 10px; position: relative; overflow: hidden;
  }
  .book-cover::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(var(--panel-line) 1px, transparent 1px);
    background-size: 12px 12px; opacity: 0.25;
  }
  .book-title { font-size: 17px; color: var(--star); position: relative; z-index: 1; line-height: 1.1; }
  .book-meta { font-size: 13px; color: var(--txt-dim); position: relative; z-index: 1; margin-top: 3px; }
  .book-del { position: absolute; top: 4px; right: 6px; z-index: 2; color: var(--txt-dim); cursor: pointer; font-size: 16px; background: var(--space-1); padding: 0 5px; border: 1px solid var(--panel-line); }
  .book-rocket { position: absolute; top: 8px; left: 8px; font-size: 20px; z-index: 1; }

  /* ---------- editor overlay ---------- */
  .editor {
    position: fixed; inset: 0; z-index: 40; background: var(--space-0);
    display: none; flex-direction: column;
  }
  .editor.open { display: flex; }
  .editor-top {
    flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--space-1); border-bottom: 3px solid var(--panel-line);
  }
  .ed-title { flex: 1; font-size: 20px; color: var(--star); }
  .ed-page { font-size: 16px; color: var(--neon-cyan); }
  .editor-tools {
    flex: 0 0 auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 14px; background: var(--space-1); border-bottom: 2px solid var(--panel-line);
  }
  .tool { font-size: 22px; background: var(--space-2); border: 2px solid var(--panel-line); cursor: pointer; padding: 4px 9px; line-height: 1; }
  .tool.active { border-color: var(--neon-cyan); background: var(--space-3); }
  .ink { width: 28px; height: 28px; border: 2px solid #000; cursor: pointer; padding: 0; border-radius: 50%; }
  .ink.active { outline: 3px solid var(--star); }
  .wt { width: 34px; background: var(--space-2); border: 2px solid var(--panel-line); cursor: pointer; color: var(--txt); line-height: 1; }
  .wt.active { border-color: var(--neon-cyan); }
  .tdiv { width: 2px; height: 26px; background: var(--panel-line); }
  .editor-canvas-wrap { flex: 1 1 auto; position: relative; overflow: hidden; background: #f7f6f0; min-height: 0; }
  #edPad { display: block; width: 100%; height: 100%; touch-action: none; }
  .editor-nav {
    flex: 0 0 auto; display: flex; gap: 8px; padding: 10px 14px;
    background: var(--space-1); border-top: 3px solid var(--panel-line);
  }
  .editor-nav .btn { flex: 1; }

  /* ---------- monthly overview ---------- */
  .mini-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .mini-cell { aspect-ratio: 1; border: 1px solid var(--space-3); background: var(--space-1); font-size: 13px; padding: 3px; position: relative; }
  .mini-cell.head { background: none; border: none; color: var(--neon-cyan); text-align: center; font-size: 12px; }
  .mini-cell.today { border-color: var(--neon-pink); }
  .mini-cell .dn { color: var(--txt-dim); }
  .dots { position: absolute; bottom: 3px; left: 3px; display: flex; gap: 2px; }
  .dots i { width: 5px; height: 5px; display: inline-block; }

  .toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px);
    background: var(--space-2); border: 3px solid var(--neon-yellow); color: var(--neon-yellow);
    font-family: "Press Start 2P", monospace; font-size: 10px; padding: 12px 16px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 50; pointer-events: none; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .empty { color: var(--txt-dim); font-size: 16px; text-align: center; padding: 14px; }
  .add-btn { width: 100%; background: var(--space-3); border: 2px dashed var(--panel-line); color: var(--neon-cyan); padding: 9px; cursor: pointer; font-family: inherit; font-size: 17px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<div id="app">
  <!-- HUD -->
  <div class="hud">
    <canvas class="astro" id="astro" width="16" height="22"></canvas>
    <div class="hud-info">
      <div class="hud-title">CMDR // MISSION LOG</div>
      <div class="rank pixel" id="rankName" style="font-size:11px;">CADET</div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
      <div class="xp-text" id="xpText">0 / 100 XP</div>
    </div>
    <div class="lvl-badge">
      <div class="pixel">LVL</div>
      <div class="num" id="lvlNum">1</div>
    </div>
  </div>

  <!-- VIEWS -->
  <div class="views">
    <!-- WEEK -->
    <div class="view active" id="view-week">
      <div class="cal-nav">
        <button class="btn" id="prevWeek">‹</button>
        <span class="wk" id="weekLabel"></span>
        <div>
          <button class="btn btn-go" id="thisWeek">TODAY</button>
          <button class="btn" id="nextWeek">›</button>
        </div>
      </div>
      <div class="days" id="days"></div>
      <div class="canvas-wrap">
        <div class="canvas-bar" id="swatches">
          <button class="swatch active" data-c="#41e0e8" style="background:#41e0e8"></button>
          <button class="swatch" data-c="#ff5fa2" style="background:#ff5fa2"></button>
          <button class="swatch" data-c="#ffd23f" style="background:#ffd23f"></button>
          <button class="swatch" data-c="#5fffa0" style="background:#5fffa0"></button>
          <button class="swatch" data-c="#f4f4ff" style="background:#f4f4ff"></button>
          <button class="btn" id="eraseBtn" style="margin-left:4px;">ERASE</button>
          <button class="btn" id="clearBtn">CLR</button>
        </div>
        <canvas id="pad"></canvas>
      </div>
    </div>

    <!-- NOTES (notebooks) -->
    <div class="view" id="view-notes">
      <h2 class="section">LOGBOOK</h2>
      <div id="shelf" class="shelf"></div>
      <button class="add-btn" id="addNotebook">+ NEW NOTEBOOK</button>
    </div>

    <!-- FINANCES -->
    <div class="view" id="view-money">
      <h2 class="section">CREDITS &amp; SUPPLIES</h2>
      <div class="panel">
        <div class="panel-title">This Month</div>
        <div class="money-stats">
          <div class="stat"><div class="k">IN</div><div class="v pos" id="mIn">$0</div></div>
          <div class="stat"><div class="k">OUT</div><div class="v neg" id="mOut">$0</div></div>
          <div class="stat"><div class="k">LEFT</div><div class="v" id="mNet">$0</div></div>
        </div>
        <div class="budget-wrap">
          <div class="row" style="margin-bottom:6px;">
            <span style="flex:1;font-size:16px;color:var(--txt-dim);">Monthly budget</span>
            <input type="number" id="budgetInput" class="shrink" style="width:120px;" placeholder="0" />
          </div>
          <div class="budget-bar"><div class="budget-fill" id="budgetFill"></div></div>
          <div id="budgetMsg" style="font-size:15px;margin-top:5px;color:var(--txt-dim);"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Log a transaction</div>
        <div class="row">
          <input type="text" id="txnDesc" placeholder="e.g. groceries" style="flex:2;" />
          <input type="number" id="txnAmt" placeholder="$" style="flex:1;" />
        </div>
        <div class="row">
          <select id="txnType" style="flex:1;">
            <option value="exp">Spent (out)</option>
            <option value="inc">Earned (in)</option>
          </select>
          <button class="btn btn-go shrink" id="addTxn" style="padding:7px 16px;">ADD</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Subscriptions</div>
        <div style="font-size:15px;color:var(--txt-dim);margin-bottom:10px;" id="subsTotal">Monthly total: $0</div>
        <div id="subsList"></div>
        <div class="row" style="margin-top:10px;">
          <input type="text" id="subName" placeholder="e.g. Spotify" style="flex:2;" />
          <input type="number" id="subAmt" placeholder="$/mo" style="flex:1;" />
        </div>
        <button class="add-btn" id="addSub">+ ADD SUBSCRIPTION</button>
      </div>
      <div class="panel">
        <div class="panel-title">Recent</div>
        <div id="txnList"></div>
      </div>
    </div>

    <!-- HABITS -->
    <div class="view" id="view-habits">
      <h2 class="section">DAILY SYSTEMS CHECK</h2>
      <div id="habitList"></div>
      <button class="add-btn" id="addHabit">+ NEW HABIT</button>
    </div>

    <!-- TODO -->
    <div class="view" id="view-todo">
      <h2 class="section">MISSION OBJECTIVES</h2>
      <div class="panel">
        <div class="row">
          <input type="text" id="todoInput" placeholder="New objective…" style="flex:3;" />
          <button class="btn btn-go shrink" id="addTodo" style="padding:7px 16px;">ADD</button>
        </div>
        <div id="todoList"></div>
      </div>
    </div>

    <!-- MONTH -->
    <div class="view" id="view-month">
      <div class="cal-nav">
        <button class="btn" id="prevMonth">‹</button>
        <span class="wk pixel" id="monthLabel" style="font-size:12px;"></span>
        <button class="btn" id="nextMonth">›</button>
      </div>
      <div class="panel">
        <div class="mini-cal" id="miniCal"></div>
        <div style="font-size:14px;color:var(--txt-dim);margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;">
          <span><i style="display:inline-block;width:8px;height:8px;background:var(--neon-yellow);"></i> note</span>
          <span><i style="display:inline-block;width:8px;height:8px;background:var(--neon-green);"></i> habit done</span>
          <span><i style="display:inline-block;width:8px;height:8px;background:var(--danger);"></i> spent</span>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Month summary</div>
        <div class="money-stats">
          <div class="stat"><div class="k">SPENT</div><div class="v neg" id="moSpent">$0</div></div>
          <div class="stat"><div class="k">EARNED</div><div class="v pos" id="moEarned">$0</div></div>
          <div class="stat"><div class="k">HABITS</div><div class="v" style="color:var(--neon-green)" id="moHabits">0</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <button class="tab active" data-view="week"><div class="ico">🗓️</div><span class="lbl">WEEK</span></button>
    <button class="tab" data-view="notes"><div class="ico">📓</div><span class="lbl">NOTES</span></button>
    <button class="tab" data-view="money"><div class="ico">💰</div><span class="lbl">CREDITS</span></button>
    <button class="tab" data-view="habits"><div class="ico">🛰️</div><span class="lbl">SYSTEMS</span></button>
    <button class="tab" data-view="todo"><div class="ico">🎯</div><span class="lbl">MISSIONS</span></button>
    <button class="tab" data-view="month"><div class="ico">🌌</div><span class="lbl">MONTH</span></button>
  </div>
</div>

<!-- NOTEBOOK EDITOR (full screen overlay) -->
<div id="editor" class="editor">
  <div class="editor-top">
    <button class="btn" id="edBack">‹ SHELF</button>
    <span class="ed-title" id="edTitle">Notebook</span>
    <span class="ed-page" id="edPage">1 / 1</span>
  </div>
  <div class="editor-tools">
    <button class="tool t-pen active" id="toolPen" title="Pen">✏️</button>
    <button class="tool t-hl" id="toolHL" title="Highlighter">🖍️</button>
    <button class="tool t-er" id="toolEr" title="Eraser">🧽</button>
    <button class="tool t-ruler" id="toolRuler" title="Ruler (straight lines)">📏</button>
    <button class="tool t-select" id="toolSelect" title="Select &amp; move">⬚</button>
    <span class="tdiv"></span>
    <button class="ink active" data-ink="#1c1c2e" style="background:#1c1c2e"></button>
    <button class="ink" data-ink="#2e6f9e" style="background:#2e6f9e"></button>
    <button class="ink" data-ink="#c0392b" style="background:#c0392b"></button>
    <button class="ink" data-ink="#27884a" style="background:#27884a"></button>
    <button class="ink" data-ink="#ff8a3d" style="background:#ff8a3d"></button>
    <span class="tdiv"></span>
    <button class="wt" data-wt="2">•</button>
    <button class="wt active" data-wt="4">●</button>
    <button class="wt" data-wt="8" style="font-size:22px;">●</button>
    <span class="tdiv"></span>
    <button class="btn" id="edUndo">↶ UNDO</button>
    <span class="tdiv sel-only" style="display:none;"></span>
    <button class="btn sel-only" id="edDup" style="display:none;">⧉ DUPLICATE</button>
    <button class="btn sel-only" id="edDelSel" style="display:none;color:var(--danger);border-color:var(--danger);">🗑 DELETE</button>
  </div>
  <div class="editor-canvas-wrap" id="edCanvasWrap">
    <canvas id="edPad"></canvas>
  </div>
  <div class="editor-nav">
    <button class="btn" id="pgPrev">‹ PREV</button>
    <button class="btn" id="pgDel">DELETE PAGE</button>
    <button class="btn" id="pgImport">⬆ IMPORT</button>
    <button class="btn btn-go" id="pgAdd">+ PAGE</button>
    <button class="btn" id="pgNext">NEXT ›</button>
  </div>
  <input type="file" id="importFile" accept="image/*,application/pdf" style="display:none;" />
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var MONTHS = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  var RANKS = ["CADET","ENSIGN","PILOT","NAVIGATOR","COMMANDER","CAPTAIN","ADMIRAL","STAR MARSHAL"];

  // ---------- persistence ----------
  function load(k, d) { try { return JSON.parse(localStorage.getItem("ml_" + k)) || d; } catch (e) { return d; } }
  function save(k, v) { try { localStorage.setItem("ml_" + k, JSON.stringify(v)); } catch (e) {} }

  var db = {
    notes:   load("notes", {}),
    txns:    load("txns", []),
    budget:  load("budget", 0),
    habits:  load("habits", [{ id: 1, name: "Drink water", log: {} }, { id: 2, name: "Exercise", log: {} }]),
    todos:   load("todos", []),
    subs:    load("subs", []),
    docs:    load("docs", []),
    xp:      load("xp", 0)
  };
  function persistAll() {
    save("notes", db.notes); save("txns", db.txns); save("budget", db.budget);
    save("habits", db.habits); save("todos", db.todos); save("subs", db.subs); save("docs", db.docs); save("xp", db.xp);
  }
  // migrate old docs -> notebook page format with strokes
  db.docs.forEach(function (d) {
    if (!d.pages) { d.pages = [{ strokes: [] }]; delete d.body; delete d.open; return; }
    d.pages = d.pages.map(function (p) {
      if (p && typeof p === "object" && p.strokes) return p;        // already new format
      if (typeof p === "string") return { strokes: [], bg: p };      // old flattened image -> background
      return { strokes: [] };                                        // null/empty
    });
  });

  // ---------- date helpers ----------
  function keyFor(d) { return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); }
  function startOfWeek(d) { var x = new Date(d); x.setHours(0,0,0,0); var day = (x.getDay() + 6) % 7; x.setDate(x.getDate() - day); return x; }
  function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function fmt(n) { return "$" + (Math.round(n*100)/100).toLocaleString("en-AU"); }

  // ---------- XP / leveling ----------
  function xpForLevel(l) { return l * 100; }
  function levelInfo() {
    var xp = db.xp, lvl = 1, rem = xp;
    while (rem >= xpForLevel(lvl)) { rem -= xpForLevel(lvl); lvl++; }
    return { lvl: lvl, into: rem, need: xpForLevel(lvl) };
  }
  function addXP(amount, reason) {
    var before = levelInfo().lvl;
    db.xp += amount; save("xp", db.xp);
    renderHUD();
    var after = levelInfo().lvl;
    if (after > before) { toast("LEVEL UP! " + (RANKS[Math.min(after-1, RANKS.length-1)])); drawAstro(); }
    else if (reason) { toast("+" + amount + " XP — " + reason); }
  }
  function renderHUD() {
    var info = levelInfo();
    $("lvlNum").textContent = info.lvl;
    $("rankName").textContent = RANKS[Math.min(info.lvl - 1, RANKS.length - 1)];
    var pct = Math.min(100, Math.round(info.into / info.need * 100));
    $("xpFill").style.width = pct + "%";
    $("xpText").textContent = info.into + " / " + info.need + " XP";
  }

  var toastTimer;
  function toast(msg) {
    var t = $("toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }

  // ---------- pixel astronaut (solarpunk explorer on a rocket) ----------
  function drawAstro() {
    var c = $("astro"), ctx = c.getContext("2d");
    ctx.clearRect(0,0,16,22);
    var info = levelInfo();
    // visor warms from amber → gold as you rank up
    var visors = ["#5a4a1e","#6b5520","#7a5f1f","#8a6a1c","#9a7518","#a87f14","#b8890f","#caa215"];
    var V = visors[Math.min(info.lvl - 1, visors.length - 1)];
    var glints = ["#ffe08a","#ffe79c","#fff0b0","#fff4bf","#fff7cf","#fffadf","#fffceb","#ffffff"];
    var GL = glints[Math.min(info.lvl - 1, glints.length - 1)];
    var O = "#3a2f1c";  // warm dark outline (bark)
    var H = "#f6efdc";  // suit cream
    var H2 = "#e3d4b0"; // suit shadow
    var LF = "#4f8a3a"; // leaf-green accent
    var R = "#c9a85f";  // brass rocket body
    var R2 = "#a8863f"; // brass shadow
    var N = "#2f7a5f";  // green nose/fins
    var W = "#8fd3c4";  // window (pale teal-glass)
    var F = "#e8a83a";  // flame outer (gold)
    var F2 = "#c9772a"; // flame inner (copper)
    var _ = null;
    var ART = [
      [_,_,_,_,O,O,O,O,O,O,_,_,_,_,_,_],
      [_,_,_,O,H,H,H,H,H,LF,O,_,_,_,_,_],
      [_,_,O,H,O,O,O,O,O,O,H,O,_,_,_,_],
      [_,_,O,H,O,V,V,V,V,O,H,O,_,_,_,_],
      [_,_,O,H,O,V,GL,V,V,O,H,O,_,_,_,_],
      [_,_,O,H,O,V,V,V,V,O,H,O,_,_,_,_],
      [_,_,O,H,O,O,O,O,O,O,H,O,_,_,_,_],
      [_,O,O,H,H,LF,H,H,LF,H,H,O,O,_,_,_],
      [_,O,H,H,H,H,LF,LF,H,H,H,H,O,_,_,_],
      [_,O,O,H,H,H,H,H,H,H,H,O,O,_,_,_],
      [_,_,_,_,O,N,N,N,N,O,_,_,_,_,_,_],
      [_,_,_,O,N,N,N,N,N,N,O,_,_,_,_,_],
      [_,_,O,R,R,R,W,W,R,R,R,O,_,_,_,_],
      [_,_,O,R,R,R,W,W,R,R,R2,O,_,_,_,_],
      [_,_,O,R,R,R,R,R,R,R,R2,O,_,_,_,_],
      [_,O,N,O,R,R,R,R,R,R,R2,O,N,O,_,_],
      [_,O,N,O,R,R,R,R,R,R,R2,O,N,O,_,_],
      [_,_,O,O,R,R,R,R,R,R,R2,O,O,_,_,_],
      [_,_,_,_,O,O,F,F,F,O,O,_,_,_,_,_],
      [_,_,_,_,_,O,F,F2,F,O,_,_,_,_,_,_],
      [_,_,_,_,_,_,O,F2,O,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,O,_,_,_,_,_,_,_,_]
    ];
    for (var y = 0; y < ART.length; y++)
      for (var x = 0; x < ART[y].length; x++)
        if (ART[y][x]) { ctx.fillStyle = ART[y][x]; ctx.fillRect(x, y, 1, 1); }
  }

  // ========== WEEK CALENDAR ==========
  var curWeek = startOfWeek(new Date());
  function renderWeek() {
    var el = $("days"); el.innerHTML = "";
    var today = new Date();
    var end = new Date(curWeek); end.setDate(end.getDate() + 6);
    var lbl = MONTHS[curWeek.getMonth()].slice(0,3) + " " + curWeek.getDate() + " – ";
    lbl += (curWeek.getMonth()===end.getMonth() ? "" : MONTHS[end.getMonth()].slice(0,3)+" ") + end.getDate();
    $("weekLabel").textContent = lbl;
    for (var i = 0; i < 7; i++) {
      var d = new Date(curWeek); d.setDate(d.getDate() + i);
      var k = keyFor(d);
      var cell = document.createElement("div");
      cell.className = "day" + (sameDay(d, today) ? " today" : "");
      cell.innerHTML = '<div class="day-h"><div class="day-name">' + DAY_NAMES[d.getDay()] +
        '</div><div class="day-date">' + d.getDate() + '</div></div>';
      var ta = document.createElement("textarea");
      ta.className = "day-note"; ta.placeholder = "…"; ta.value = db.notes[k] || "";
      (function (key, f) {
        f.addEventListener("input", function () {
          if (f.value) db.notes[key] = f.value; else delete db.notes[key];
          save("notes", db.notes);
        });
      })(k, ta);
      cell.appendChild(ta); el.appendChild(cell);
    }
  }
  $("prevWeek").onclick = function () { curWeek.setDate(curWeek.getDate()-7); renderWeek(); };
  $("nextWeek").onclick = function () { curWeek.setDate(curWeek.getDate()+7); renderWeek(); };
  $("thisWeek").onclick = function () { curWeek = startOfWeek(new Date()); renderWeek(); };

  // ========== DRAWING CANVAS ==========
  var canvas = $("pad"), ctx = canvas.getContext("2d");
  var drawColor = "#41e0e8", erasing = false, drawing = false, last = null, dpr = 1;
  function sizeCanvas() {
    var prev = canvas.width ? canvas.toDataURL() : null;
    var r = canvas.parentElement.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    canvas.width = r.width * dpr; canvas.height = r.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (prev) { var im = new Image(); im.onload = function () { ctx.drawImage(im,0,0,r.width,r.height); }; im.src = prev; }
    else { var d = localStorage.getItem("ml_canvas"); if (d) { var i2 = new Image(); i2.onload = function () { ctx.drawImage(i2,0,0,r.width,r.height); }; i2.src = d; } }
  }
  function cpos(e) { var r = canvas.getBoundingClientRect(); var cx = (e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX; var cy = (e.touches&&e.touches[0])?e.touches[0].clientY:e.clientY; return { x: cx - r.left, y: cy - r.top }; }
  function sd(e) { e.preventDefault(); drawing = true; last = cpos(e); }
  function md(e) {
    if (!drawing) return; e.preventDefault(); var p = cpos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y);
    if (erasing) { ctx.globalCompositeOperation = "destination-out"; ctx.lineWidth = 22; }
    else { ctx.globalCompositeOperation = "source-over"; ctx.lineWidth = 4; ctx.strokeStyle = drawColor; }
    ctx.stroke(); last = p;
  }
  function ed() { if (drawing) { drawing = false; try { localStorage.setItem("ml_canvas", canvas.toDataURL()); } catch (e) {} } }
  canvas.addEventListener("pointerdown", function (e) { canvas.setPointerCapture(e.pointerId); sd(e); });
  canvas.addEventListener("pointermove", function (e) { if (drawing) md(e); });
  canvas.addEventListener("pointerup", function (e) { ed(); try { canvas.releasePointerCapture(e.pointerId); } catch (x) {} });
  canvas.addEventListener("pointercancel", ed);
  canvas.addEventListener("pointerleave", function () { if (drawing) ed(); });
  $("swatches").querySelectorAll(".swatch").forEach(function (s) {
    s.onclick = function () {
      $("swatches").querySelectorAll(".swatch").forEach(function (x) { x.classList.remove("active"); });
      s.classList.add("active"); drawColor = s.getAttribute("data-c"); erasing = false;
    };
  });
  $("eraseBtn").onclick = function () { erasing = !erasing; this.style.color = erasing ? "var(--neon-pink)" : ""; };
  $("clearBtn").onclick = function () { ctx.clearRect(0,0,canvas.width,canvas.height); localStorage.removeItem("ml_canvas"); };

  // ========== FINANCES ==========
  function thisMonthTxns() {
    var now = new Date();
    return db.txns.filter(function (t) { var d = new Date(t.ts); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  }
  function renderMoney() {
    var mt = thisMonthTxns();
    var inc = 0, exp = 0;
    mt.forEach(function (t) { if (t.type === "inc") inc += t.amt; else exp += t.amt; });
    $("mIn").textContent = fmt(inc); $("mOut").textContent = fmt(exp);
    var net = inc - exp; var ne = $("mNet"); ne.textContent = fmt(net);
    ne.className = "v " + (net >= 0 ? "pos" : "neg");
    // budget
    $("budgetInput").value = db.budget || "";
    var bf = $("budgetFill"), msg = $("budgetMsg");
    if (db.budget > 0) {
      var pct = Math.min(100, Math.round(exp / db.budget * 100));
      bf.style.width = pct + "%";
      bf.style.background = pct < 70 ? "var(--neon-green)" : pct < 100 ? "var(--neon-yellow)" : "var(--danger)";
      msg.textContent = fmt(exp) + " of " + fmt(db.budget) + " used (" + pct + "%)";
      msg.style.color = pct >= 100 ? "var(--danger)" : "var(--txt-dim)";
    } else { bf.style.width = "0%"; msg.textContent = "Set a budget to start earning XP for staying under it."; }
    // list
    var list = $("txnList");
    if (!db.txns.length) { list.innerHTML = '<div class="empty">No transactions yet.</div>'; return; }
    list.innerHTML = "";
    db.txns.slice().reverse().slice(0, 30).forEach(function (t) {
      var row = document.createElement("div"); row.className = "txn";
      var date = new Date(t.ts);
      row.innerHTML = '<span class="desc">' + escapeHtml(t.desc) + '</span>' +
        '<span style="font-size:13px;color:var(--txt-dim)">' + (date.getMonth()+1) + '/' + date.getDate() + '</span>' +
        '<span class="amt ' + t.type + '">' + (t.type==="exp"?"-":"+") + fmt(t.amt) + '</span>' +
        '<span class="del" data-id="' + t.id + '">✕</span>';
      list.appendChild(row);
    });
    list.querySelectorAll(".del").forEach(function (b) {
      b.onclick = function () {
        var id = +this.getAttribute("data-id");
        db.txns = db.txns.filter(function (t) { return t.id !== id; });
        save("txns", db.txns); renderMoney();
      };
    });
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, function (c) { return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
  $("addTxn").onclick = function () {
    var desc = $("txnDesc").value.trim(), amt = parseFloat($("txnAmt").value), type = $("txnType").value;
    if (!desc || !(amt > 0)) { toast("Enter a description & amount"); return; }
    var underBefore = db.budget > 0 && thisMonthTxns().reduce(function (s,t){return s+(t.type==="exp"?t.amt:0);},0) < db.budget;
    db.txns.push({ id: Date.now(), desc: desc, amt: amt, type: type, ts: Date.now() });
    save("txns", db.txns);
    $("txnDesc").value = ""; $("txnAmt").value = "";
    renderMoney();
    // reward: logging keeps you mindful; staying under budget gives XP
    if (type === "exp" && db.budget > 0) {
      var spent = thisMonthTxns().reduce(function (s,t){return s+(t.type==="exp"?t.amt:0);},0);
      if (spent <= db.budget) addXP(5, "under budget"); else toast("Over budget — no XP");
    } else { addXP(2, "logged"); }
  };
  $("budgetInput").addEventListener("change", function () {
    db.budget = parseFloat(this.value) || 0; save("budget", db.budget); renderMoney();
  });

  // ----- subscriptions -----
  function renderSubs() {
    var total = db.subs.reduce(function (s, x) { return s + x.amt; }, 0);
    $("subsTotal").textContent = "Monthly total: " + fmt(total);
    var list = $("subsList");
    if (!db.subs.length) { list.innerHTML = '<div class="empty">No subscriptions tracked yet.</div>'; return; }
    list.innerHTML = "";
    db.subs.forEach(function (sub) {
      var row = document.createElement("div"); row.className = "txn";
      row.innerHTML = '<span class="desc">' + escapeHtml(sub.name) + '</span>' +
        '<span class="amt exp">' + fmt(sub.amt) + '/mo</span>' +
        '<span class="del" data-sub="' + sub.id + '">✕</span>';
      list.appendChild(row);
    });
    list.querySelectorAll("[data-sub]").forEach(function (b) {
      b.onclick = function () {
        var id = +this.getAttribute("data-sub");
        db.subs = db.subs.filter(function (s) { return s.id !== id; });
        save("subs", db.subs); renderSubs();
      };
    });
  }
  $("addSub").onclick = function () {
    var name = $("subName").value.trim(), amt = parseFloat($("subAmt").value);
    if (!name || !(amt > 0)) { toast("Enter a name & monthly cost"); return; }
    db.subs.push({ id: Date.now(), name: name, amt: amt });
    save("subs", db.subs); $("subName").value = ""; $("subAmt").value = "";
    renderSubs();
  };

  // ========== HABITS ==========
  function weekKeysFromToday() {
    var arr = [], t = new Date();
    for (var i = 6; i >= 0; i--) { var d = new Date(t); d.setDate(d.getDate() - i); arr.push({ key: keyFor(d), label: DAY_NAMES[d.getDay()][0], date: d.getDate() }); }
    return arr;
  }
  function streakOf(h) {
    var s = 0, d = new Date();
    while (h.log[keyFor(d)]) { s++; d.setDate(d.getDate() - 1); }
    return s;
  }
  function renderHabits() {
    var el = $("habitList"); el.innerHTML = "";
    if (!db.habits.length) { el.innerHTML = '<div class="empty">No habits yet — add one below.</div>'; }
    var wk = weekKeysFromToday();
    db.habits.forEach(function (h) {
      var card = document.createElement("div"); card.className = "habit";
      var top = document.createElement("div"); top.className = "habit-top";
      top.innerHTML = '<span class="habit-name">' + escapeHtml(h.name) + '</span>' +
        '<span class="streak">🔥 ' + streakOf(h) + '</span>' +
        '<span class="del-x" data-del="' + h.id + '">✕</span>';
      var week = document.createElement("div"); week.className = "habit-week";
      wk.forEach(function (w) {
        var box = document.createElement("div");
        box.className = "hbox" + (h.log[w.key] ? " done" : "");
        box.innerHTML = '<span class="dl">' + w.label + '</span>';
        box.onclick = (function (habit, key, b) { return function () {
          if (habit.log[key]) { delete habit.log[key]; b.classList.remove("done"); }
          else { habit.log[key] = true; b.classList.add("done"); addXP(10, "habit logged"); }
          save("habits", db.habits); renderHabits();
        }; })(h, w.key, box);
        week.appendChild(box);
      });
      card.appendChild(top); card.appendChild(week); el.appendChild(card);
    });
    el.querySelectorAll("[data-del]").forEach(function (x) {
      x.onclick = function () {
        var id = +this.getAttribute("data-del");
        db.habits = db.habits.filter(function (h) { return h.id !== id; });
        save("habits", db.habits); renderHabits();
      };
    });
  }
  $("addHabit").onclick = function () {
    var name = prompt("Name your new habit:");
    if (name && name.trim()) { db.habits.push({ id: Date.now(), name: name.trim(), log: {} }); save("habits", db.habits); renderHabits(); }
  };

  // ========== TODO ==========
  function renderTodos() {
    var el = $("todoList"); el.innerHTML = "";
    if (!db.todos.length) { el.innerHTML = '<div class="empty">No objectives yet.</div>'; return; }
    db.todos.forEach(function (t) {
      var row = document.createElement("div"); row.className = "todo" + (t.done ? " done" : "");
      row.innerHTML = '<div class="check">' + (t.done ? "✓" : "") + '</div>' +
        '<span class="ttxt">' + escapeHtml(t.text) + '</span>' +
        '<span class="del-x" data-del="' + t.id + '">✕</span>';
      row.querySelector(".check").onclick = function () {
        t.done = !t.done; save("todos", db.todos); renderTodos();
        if (t.done) addXP(8, "objective complete");
      };
      row.querySelector("[data-del]").onclick = function () {
        db.todos = db.todos.filter(function (x) { return x.id !== t.id; });
        save("todos", db.todos); renderTodos();
      };
      el.appendChild(row);
    });
  }
  function addTodo() {
    var v = $("todoInput").value.trim();
    if (!v) return;
    db.todos.push({ id: Date.now(), text: v, done: false }); save("todos", db.todos);
    $("todoInput").value = ""; renderTodos();
  }
  $("addTodo").onclick = addTodo;
  $("todoInput").addEventListener("keydown", function (e) { if (e.key === "Enter") addTodo(); });

  // ========== NOTES / NOTEBOOKS (handwriting) ==========
  // db.docs = [{ id, title, pages: [dataURL|null,...], updated }]
  function renderShelf() {
    var el = $("shelf"); el.innerHTML = "";
    if (!db.docs.length) {
      el.innerHTML = '<div class="empty" style="grid-column:1/-1;">No notebooks yet — create one below.</div>';
      return;
    }
    db.docs.forEach(function (nb) {
      var book = document.createElement("div"); book.className = "book";
      var date = new Date(nb.updated);
      book.innerHTML =
        '<div class="book-cover">' +
          '<span class="book-rocket">🚀</span>' +
          '<span class="book-del" data-del="' + nb.id + '">✕</span>' +
          '<div class="book-title">' + escapeHtml(nb.title) + '</div>' +
          '<div class="book-meta">' + nb.pages.length + ' pg · ' + (date.getMonth()+1) + '/' + date.getDate() + '</div>' +
        '</div>';
      book.querySelector(".book-cover").onclick = function (e) {
        if (e.target.getAttribute("data-del")) return;
        openNotebook(nb.id);
      };
      book.querySelector("[data-del]").onclick = function () {
        if (!confirm("Delete \"" + nb.title + "\" and all its pages?")) return;
        db.docs = db.docs.filter(function (d) { return d.id !== nb.id; });
        save("docs", db.docs); renderShelf();
      };
      el.appendChild(book);
    });
  }
  function renderNotes() { renderShelf(); }  // alias used by tab switch / init
  $("addNotebook").onclick = function () {
    var t = prompt("Name your notebook:");
    if (t === null) return;
    t = t.trim() || "Untitled";
    var nb = { id: Date.now(), title: t, pages: [null], updated: Date.now() };
    db.docs.unshift(nb); save("docs", db.docs); renderShelf();
    openNotebook(nb.id);
  };

  // ----- editor state (stroke-based) -----
  // page = { strokes: [ {tool, color, weight, pts:[{x,y}...]} ] }  coords normalized 0..1
  var ed = {
    nbId: null, page: 0,
    tool: "pen", ink: "#1c1c2e", weight: 4,
    drawing: false, last: null, dpr: 1, w: 1, h: 1,
    cur: null,            // stroke being drawn
    sel: null,            // {minx,miny,maxx,maxy} selection rect (normalized)
    selStrokes: [],       // indices of selected strokes
    dragging: false, dragStart: null
  };
  var edPad = $("edPad"), edCtx = edPad.getContext("2d");

  function curNotebook() { return db.docs.filter(function (d) { return d.id === ed.nbId; })[0]; }
  function curPage() { var nb = curNotebook(); return nb ? nb.pages[ed.page] : null; }

  function openNotebook(id) {
    ed.nbId = id; ed.page = 0;
    var nb = curNotebook(); if (!nb) return;
    $("edTitle").textContent = nb.title;
    $("editor").classList.add("open");
    setTimeout(function () { sizeEdCanvas(); loadPage(); }, 30);
  }
  $("edBack").onclick = function () {
    $("editor").classList.remove("open");
    clearSel();
    var nb = curNotebook(); if (nb) { nb.updated = Date.now(); save("docs", db.docs); }
    renderShelf();
  };

  function sizeEdCanvas() {
    var r = $("edCanvasWrap").getBoundingClientRect();
    ed.dpr = window.devicePixelRatio || 1;
    ed.w = r.width; ed.h = r.height;
    edPad.width = r.width * ed.dpr; edPad.height = r.height * ed.dpr;
    edCtx.setTransform(ed.dpr, 0, 0, ed.dpr, 0, 0);
    edCtx.lineCap = "round"; edCtx.lineJoin = "round";
  }
  function drawDotGrid() {
    edCtx.fillStyle = "#f7f6f0"; edCtx.fillRect(0, 0, ed.w, ed.h);
    edCtx.fillStyle = "#c9c5b4";
    var gap = 26;
    for (var y = gap; y < ed.h; y += gap)
      for (var x = gap; x < ed.w; x += gap) { edCtx.beginPath(); edCtx.arc(x, y, 1.4, 0, 6.3); edCtx.fill(); }
  }
  function strokeStyleFor(s) {
    if (s.tool === "highlighter") { edCtx.strokeStyle = hexA(s.color, 0.30); edCtx.lineWidth = s.weight * 4; }
    else { edCtx.strokeStyle = s.color; edCtx.lineWidth = s.weight; }
  }
  function paintStroke(s, offx, offy) {
    if (!s.pts.length) return;
    offx = offx || 0; offy = offy || 0;
    strokeStyleFor(s);
    edCtx.beginPath();
    edCtx.moveTo((s.pts[0].x + offx) * ed.w, (s.pts[0].y + offy) * ed.h);
    for (var i = 1; i < s.pts.length; i++) edCtx.lineTo((s.pts[i].x + offx) * ed.w, (s.pts[i].y + offy) * ed.h);
    if (s.pts.length === 1) edCtx.lineTo((s.pts[0].x + offx) * ed.w + 0.1, (s.pts[0].y + offy) * ed.h + 0.1);
    edCtx.stroke();
  }
  function redraw() {
    var pg = curPage(); if (!pg) return;
    drawDotGrid();
    if (pg.bg) {
      if (!pg._bgImg) { pg._bgImg = new Image(); pg._bgImg.onload = function () { redraw(); }; pg._bgImg.src = pg.bg; }
      else if (pg._bgImg.complete && pg._bgImg.naturalWidth) {
        var iw = pg._bgImg.naturalWidth, ih = pg._bgImg.naturalHeight;
        var scale = Math.min(ed.w / iw, ed.h / ih);   // fit, preserve aspect
        var dw = iw * scale, dh = ih * scale;
        var dx = (ed.w - dw) / 2, dy = (ed.h - dh) / 2;
        edCtx.drawImage(pg._bgImg, dx, dy, dw, dh);
      }
    }
    pg.strokes.forEach(function (s) { paintStroke(s); });
    if (ed.sel) drawSelBox();
  }
  function drawSelBox() {
    var x = ed.sel.minx * ed.w, y = ed.sel.miny * ed.h, w = (ed.sel.maxx - ed.sel.minx) * ed.w, h = (ed.sel.maxy - ed.sel.miny) * ed.h;
    edCtx.save();
    edCtx.strokeStyle = "#2e6f9e"; edCtx.lineWidth = 1.5; edCtx.setLineDash([6, 4]);
    edCtx.strokeRect(x, y, w, h);
    edCtx.restore();
  }
  function loadPage() {
    var nb = curNotebook(); if (!nb) return;
    if (!nb.pages[ed.page]) nb.pages[ed.page] = { strokes: [] };
    $("edPage").textContent = (ed.page + 1) + " / " + nb.pages.length;
    clearSel();
    redraw();
  }
  function savePage() { var nb = curNotebook(); if (!nb) return; nb.updated = Date.now(); save("docs", db.docs); }

  function edPos(e) {
    var r = edPad.getBoundingClientRect();
    var cx = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    var cy = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
    return { x: (cx - r.left) / ed.w, y: (cy - r.top) / ed.h };  // normalized
  }
  function clearSel() { ed.sel = null; ed.selStrokes = []; if (typeof updateSelButtons === "function") updateSelButtons(); }

  function edStart(e) {
    e.preventDefault();
    var p = edPos(e);
    if (ed.tool === "select") {
      // if there's a selection and the touch is inside it -> start dragging
      if (ed.sel && p.x >= ed.sel.minx && p.x <= ed.sel.maxx && p.y >= ed.sel.miny && p.y <= ed.sel.maxy) {
        ed.dragging = true; ed.dragStart = p; ed.last = p; return;
      }
      // otherwise begin a new selection rectangle
      ed.sel = { minx: p.x, miny: p.y, maxx: p.x, maxy: p.y, _ax: p.x, _ay: p.y };
      ed.selStrokes = []; ed.drawing = true; ed.last = p; return;
    }
    if (ed.tool === "eraser") { ed.drawing = true; ed.last = p; eraseAt(p); return; }
    // pen / highlighter / ruler -> begin a stroke
    ed.cur = { tool: ed.tool === "ruler" ? "pen" : ed.tool, color: ed.ink, weight: ed.weight, pts: [p] };
    ed.drawing = true; ed.last = p;
    redraw(); paintStroke(ed.cur);
  }
  function edMove(e) {
    if (!ed.drawing && !ed.dragging) return;
    e.preventDefault();
    var p = edPos(e);
    if (ed.dragging) {
      var dx = p.x - ed.last.x, dy = p.y - ed.last.y;
      var pg = curPage();
      ed.selStrokes.forEach(function (idx) { pg.strokes[idx].pts.forEach(function (pt) { pt.x += dx; pt.y += dy; }); });
      ed.sel.minx += dx; ed.sel.maxx += dx; ed.sel.miny += dy; ed.sel.maxy += dy;
      ed.last = p; redraw(); return;
    }
    if (ed.tool === "select") {
      ed.sel.minx = Math.min(ed.sel._ax, p.x); ed.sel.maxx = Math.max(ed.sel._ax, p.x);
      ed.sel.miny = Math.min(ed.sel._ay, p.y); ed.sel.maxy = Math.max(ed.sel._ay, p.y);
      redraw(); return;
    }
    if (ed.tool === "eraser") { eraseAt(p); ed.last = p; return; }
    if (ed.tool === "ruler") {
      // straight line from start to current, snapped to nearest 45° if close
      var a = ed.cur.pts[0];
      var end = snapAngle(a, p);
      ed.cur.pts = [a, end];
    } else {
      ed.cur.pts.push(p);
    }
    redraw(); paintStroke(ed.cur);
    ed.last = p;
  }
  function edEnd() {
    if (ed.dragging) { ed.dragging = false; savePage(); return; }
    if (!ed.drawing) return;
    ed.drawing = false;
    if (ed.tool === "select") {
      // figure out which strokes fall inside the box
      var pg = curPage(); ed.selStrokes = [];
      if (ed.sel && (ed.sel.maxx - ed.sel.minx > 0.005)) {
        pg.strokes.forEach(function (s, i) {
          var inside = s.pts.every(function (pt) { return pt.x >= ed.sel.minx && pt.x <= ed.sel.maxx && pt.y >= ed.sel.miny && pt.y <= ed.sel.maxy; });
          if (inside && s.pts.length) ed.selStrokes.push(i);
        });
        if (!ed.selStrokes.length) clearSel();
      } else { clearSel(); }
      updateSelButtons();
      redraw(); return;
    }
    if (ed.cur && ed.cur.pts.length) { curPage().strokes.push(ed.cur); ed.cur = null; savePage(); }
  }
  function eraseAt(p) {
    var pg = curPage(); if (!pg) return;
    var r = 0.022;  // erase radius (normalized)
    var before = pg.strokes.length;
    pg.strokes = pg.strokes.filter(function (s) {
      return !s.pts.some(function (pt) { return Math.abs(pt.x - p.x) < r && Math.abs(pt.y - p.y) < r; });
    });
    if (pg.strokes.length !== before) { redraw(); savePage(); }
  }
  function hexA(hex, a) { var h = hex.replace("#",""); return "rgba(" + parseInt(h.slice(0,2),16) + "," + parseInt(h.slice(2,4),16) + "," + parseInt(h.slice(4,6),16) + "," + a + ")"; }
  function snapAngle(a, p) {
    // work in pixel space so 45° looks 45° on screen
    var dx = (p.x - a.x) * ed.w, dy = (p.y - a.y) * ed.h;
    var len = Math.sqrt(dx*dx + dy*dy);
    if (len < 4) return { x: p.x, y: p.y };
    var ang = Math.atan2(dy, dx);
    var step = Math.PI / 4;               // 45°
    var snapped = Math.round(ang / step) * step;
    if (Math.abs(ang - snapped) < (Math.PI / 18)) {   // within 10° -> snap
      var nx = a.x + (Math.cos(snapped) * len) / ed.w;
      var ny = a.y + (Math.sin(snapped) * len) / ed.h;
      return { x: nx, y: ny };
    }
    return { x: p.x, y: p.y };
  }

  // Pointer Events fix the Apple Pencil "draws while hovering" bug:
  // a stroke only begins on pointerdown and ends on pointerup/cancel.
  edPad.addEventListener("pointerdown", function (e) {
    if (e.pointerType === "touch" && ed.tool !== "select" && e.isPrimary === false) return;
    edPad.setPointerCapture(e.pointerId);
    edStart(e);
  });
  edPad.addEventListener("pointermove", function (e) {
    if (!ed.drawing && !ed.dragging) return;  // ignore pure hover movement
    edMove(e);
  });
  edPad.addEventListener("pointerup", function (e) { edEnd(e); try { edPad.releasePointerCapture(e.pointerId); } catch (x) {} });
  edPad.addEventListener("pointercancel", function (e) { edEnd(e); });
  edPad.addEventListener("pointerleave", function (e) { if (ed.drawing || ed.dragging) edEnd(e); });

  // tool buttons
  var TOOL_BTN = { pen: "toolPen", highlighter: "toolHL", eraser: "toolEr", ruler: "toolRuler", select: "toolSelect" };
  function setTool(name) {
    ed.tool = name;
    Object.keys(TOOL_BTN).forEach(function (k) { $(TOOL_BTN[k]).classList.toggle("active", k === name); });
    if (name !== "select") { clearSel(); redraw(); }
    edPad.style.cursor = name === "select" ? "move" : "crosshair";
  }
  $("toolPen").onclick = function () { setTool("pen"); };
  $("toolHL").onclick = function () { setTool("highlighter"); };
  $("toolEr").onclick = function () { setTool("eraser"); };
  $("toolRuler").onclick = function () { setTool("ruler"); };
  $("toolSelect").onclick = function () { setTool("select"); };

  document.querySelectorAll(".ink").forEach(function (b) {
    b.onclick = function () {
      document.querySelectorAll(".ink").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active"); ed.ink = b.getAttribute("data-ink");
      if (ed.tool === "eraser" || ed.tool === "select") setTool("pen");
    };
  });
  document.querySelectorAll(".wt").forEach(function (b) {
    b.onclick = function () {
      document.querySelectorAll(".wt").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active"); ed.weight = parseFloat(b.getAttribute("data-wt"));
    };
  });
  $("edUndo").onclick = function () {
    var pg = curPage(); if (!pg || !pg.strokes.length) return;
    pg.strokes.pop(); clearSel(); redraw(); savePage();
  };
  function updateSelButtons() {
    var show = ed.selStrokes && ed.selStrokes.length ? "" : "none";
    document.querySelectorAll(".sel-only").forEach(function (b) { b.style.display = show; });
  }
  $("edDelSel").onclick = function () {
    if (!ed.selStrokes.length) return;
    var pg = curPage();
    var set = {}; ed.selStrokes.forEach(function (i) { set[i] = true; });
    pg.strokes = pg.strokes.filter(function (s, i) { return !set[i]; });
    clearSel(); updateSelButtons(); redraw(); savePage();
  };
  $("edDup").onclick = function () {
    if (!ed.selStrokes.length) return;
    var pg = curPage();
    var off = 0.03;  // offset the copy slightly down-right
    var copies = [];
    ed.selStrokes.forEach(function (i) {
      var s = pg.strokes[i];
      copies.push({ tool: s.tool, color: s.color, weight: s.weight,
        pts: s.pts.map(function (pt) { return { x: pt.x + off, y: pt.y + off }; }) });
    });
    var startIdx = pg.strokes.length;
    pg.strokes = pg.strokes.concat(copies);
    // select the new copies and shift the selection box
    ed.selStrokes = copies.map(function (_, k) { return startIdx + k; });
    if (ed.sel) { ed.sel.minx += off; ed.sel.maxx += off; ed.sel.miny += off; ed.sel.maxy += off; }
    redraw(); savePage();
  };

  // page nav
  $("pgPrev").onclick = function () { if (ed.page > 0) { ed.page--; loadPage(); } };
  $("pgNext").onclick = function () { var nb = curNotebook(); if (ed.page < nb.pages.length - 1) { ed.page++; loadPage(); } };
  $("pgAdd").onclick = function () {
    var nb = curNotebook(); nb.pages.splice(ed.page + 1, 0, { strokes: [] }); ed.page++;
    save("docs", db.docs); loadPage();
  };
  $("pgDel").onclick = function () {
    var nb = curNotebook();
    if (nb.pages.length === 1) { if (!confirm("Clear this page?")) return; nb.pages[0] = { strokes: [] }; save("docs", db.docs); loadPage(); return; }
    if (!confirm("Delete this page?")) return;
    nb.pages.splice(ed.page, 1);
    if (ed.page >= nb.pages.length) ed.page = nb.pages.length - 1;
    save("docs", db.docs); loadPage();
  };
  window.addEventListener("resize", function () {
    if ($("editor").classList.contains("open")) { sizeEdCanvas(); redraw(); }
  });

  // ----- import images & PDFs as notebook pages -----
  $("pgImport").onclick = function () { $("importFile").value = ""; $("importFile").click(); };
  $("importFile").addEventListener("change", function () {
    var file = this.files && this.files[0];
    if (!file) return;
    if (file.type === "application/pdf") importPdf(file);
    else if (file.type.indexOf("image/") === 0) importImage(file);
    else toast("Use an image or PDF");
  });

  function insertBgPage(dataURL) {
    var nb = curNotebook(); if (!nb) return;
    // if current page is blank (no strokes, no bg), replace it; otherwise insert after
    var pg = nb.pages[ed.page];
    if (pg && !pg.bg && (!pg.strokes || !pg.strokes.length)) {
      nb.pages[ed.page] = { strokes: [], bg: dataURL };
    } else {
      nb.pages.splice(ed.page + 1, 0, { strokes: [], bg: dataURL }); ed.page++;
    }
    save("docs", db.docs); loadPage();
  }

  function importImage(file) {
    toast("Importing image…");
    var reader = new FileReader();
    reader.onload = function () {
      // re-encode to a reasonable size so storage stays small
      var img = new Image();
      img.onload = function () {
        var max = 1400;
        var scale = Math.min(1, max / Math.max(img.width, img.height));
        var cv = document.createElement("canvas");
        cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
        var cx = cv.getContext("2d");
        cx.fillStyle = "#ffffff"; cx.fillRect(0, 0, cv.width, cv.height);
        cx.drawImage(img, 0, 0, cv.width, cv.height);
        insertBgPage(cv.toDataURL("image/jpeg", 0.85));
        toast("Image added");
      };
      img.onerror = function () { toast("Couldn't read image"); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  function importPdf(file) {
    if (typeof pdfjsLib === "undefined") { toast("PDF engine still loading — try again"); return; }
    try { pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; } catch (e) {}
    toast("Importing PDF…");
    var reader = new FileReader();
    reader.onload = function () {
      var task = pdfjsLib.getDocument({ data: new Uint8Array(reader.result) });
      task.promise.then(function (pdf) {
        var maxPages = Math.min(pdf.numPages, 30);
        var idx = 1;
        function next() {
          if (idx > maxPages) { toast(maxPages + " page(s) added"); return; }
          pdf.getPage(idx).then(function (page) {
            var vp1 = page.getViewport({ scale: 1 });
            var scale = Math.min(1400 / vp1.width, 2);
            var vp = page.getViewport({ scale: scale });
            var cv = document.createElement("canvas");
            cv.width = Math.round(vp.width); cv.height = Math.round(vp.height);
            var cx = cv.getContext("2d");
            cx.fillStyle = "#ffffff"; cx.fillRect(0, 0, cv.width, cv.height);
            page.render({ canvasContext: cx, viewport: vp }).promise.then(function () {
              insertBgPage(cv.toDataURL("image/jpeg", 0.8));
              idx++; setTimeout(next, 40);
            });
          });
        }
        next();
      }).catch(function () { toast("Couldn't open PDF"); });
    };
    reader.readAsArrayBuffer(file);
  }

  // ========== MONTHLY OVERVIEW ==========
  var curMonth = new Date(); curMonth.setDate(1);
  function renderMonth() {
    $("monthLabel").textContent = MONTHS[curMonth.getMonth()] + " " + curMonth.getFullYear();
    var grid = $("miniCal"); grid.innerHTML = "";
    ["M","T","W","T","F","S","S"].forEach(function (d) {
      var h = document.createElement("div"); h.className = "mini-cell head"; h.textContent = d; grid.appendChild(h);
    });
    var first = new Date(curMonth.getFullYear(), curMonth.getMonth(), 1);
    var startPad = (first.getDay() + 6) % 7;
    var daysIn = new Date(curMonth.getFullYear(), curMonth.getMonth() + 1, 0).getDate();
    var today = new Date();
    for (var p = 0; p < startPad; p++) { var bl = document.createElement("div"); bl.className = "mini-cell"; bl.style.visibility = "hidden"; grid.appendChild(bl); }
    for (var day = 1; day <= daysIn; day++) {
      var d = new Date(curMonth.getFullYear(), curMonth.getMonth(), day);
      var k = keyFor(d);
      var cell = document.createElement("div");
      cell.className = "mini-cell" + (sameDay(d, today) ? " today" : "");
      var dots = "";
      if (db.notes[k]) dots += '<i style="background:var(--neon-yellow)"></i>';
      if (db.habits.some(function (h) { return h.log[k]; })) dots += '<i style="background:var(--neon-green)"></i>';
      if (db.txns.some(function (t) { var td = new Date(t.ts); return t.type==="exp" && sameDay(td, d); })) dots += '<i style="background:var(--danger)"></i>';
      cell.innerHTML = '<span class="dn">' + day + '</span><div class="dots">' + dots + '</div>';
      grid.appendChild(cell);
    }
    // summary
    var spent = 0, earned = 0, habitCount = 0;
    db.txns.forEach(function (t) { var td = new Date(t.ts); if (td.getMonth()===curMonth.getMonth() && td.getFullYear()===curMonth.getFullYear()) { if (t.type==="exp") spent += t.amt; else earned += t.amt; } });
    db.habits.forEach(function (h) { Object.keys(h.log).forEach(function (key) { var pp = key.split("-"); if (+pp[1]-1===curMonth.getMonth() && +pp[0]===curMonth.getFullYear()) habitCount++; }); });
    $("moSpent").textContent = fmt(spent); $("moEarned").textContent = fmt(earned); $("moHabits").textContent = habitCount;
  }
  $("prevMonth").onclick = function () { curMonth.setMonth(curMonth.getMonth()-1); renderMonth(); };
  $("nextMonth").onclick = function () { curMonth.setMonth(curMonth.getMonth()+1); renderMonth(); };

  // ========== TABS ==========
  document.querySelectorAll(".tab").forEach(function (t) {
    t.onclick = function () {
      document.querySelectorAll(".tab").forEach(function (x) { x.classList.remove("active"); });
      document.querySelectorAll(".view").forEach(function (v) { v.classList.remove("active"); });
      t.classList.add("active");
      var v = t.getAttribute("data-view");
      $("view-" + v).classList.add("active");
      if (v === "money") { renderMoney(); renderSubs(); }
      if (v === "habits") renderHabits();
      if (v === "todo") renderTodos();
      if (v === "month") renderMonth();
      if (v === "notes") renderNotes();
      if (v === "week") setTimeout(sizeCanvas, 30);
    };
  });

  // ========== INIT ==========
  drawAstro(); renderHUD(); renderWeek(); renderMoney(); renderSubs(); renderHabits(); renderTodos(); renderNotes();
  setTimeout(sizeCanvas, 60);
  window.addEventListener("resize", function () { if ($("view-week").classList.contains("active")) sizeCanvas(); });
})();
</script>
</body>
</html>
